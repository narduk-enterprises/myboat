# .forgejo/workflows/ship.yml
#
# Forgejo-native ship workflow — Phase 3 pilot
#
# Wraps the existing `pnpm run ship` deploy path (tools/ship.ts) so that
# Forgejo runners can trigger production deploys.  The GitHub Actions
# fallback path (`.github/workflows/ci.yml`) is unchanged.
#
# ─── Required repo secrets ────────────────────────────────────────────────────
#
#   DOPPLER_TOKEN       — Doppler service token scoped to this project/prd.
#                         ship.ts calls `doppler run --config prd` internally
#                         for all production secrets (CLOUDFLARE_API_TOKEN,
#                         CLOUDFLARE_ACCOUNT_ID, SITE_URL, etc.).
#
#   GH_PACKAGES_TOKEN   — GitHub PAT with read:packages scope.
#                         Required to install @narduk-enterprises/* from
#                         https://npm.pkg.github.com during `pnpm install`.
#
# ─── Optional repo secrets ────────────────────────────────────────────────────
#
#   SHIP_GIT_TOKEN      — Personal access token (or bot PAT) with repo write
#                         access.  When set, used in place of the built-in
#                         GITHUB_TOKEN for the checkout/git-push step.
#                         Needed only when the built-in token lacks push
#                         permission on the target branch.
#
# ─── Platform dispatch integration note ───────────────────────────────────────
#
#   For later integration with platform dispatch, call this workflow via the
#   Forgejo API:
#
#     POST /api/v1/repos/{owner}/{repo}/actions/workflows/ship.yml/dispatches
#     Authorization: token <PAT>
#     Content-Type: application/json
#
#     { "ref": "main", "inputs": { "app": "web" } }
#
# ──────────────────────────────────────────────────────────────────────────────

name: Ship

on:
  workflow_dispatch:
    inputs:
      app:
        description: >
          App target to deploy (sub-directory name under apps/, e.g. "web").
          Passed directly to tools/ship.ts as the positional argument.
        required: false
        default: 'web'
        type: string

# Never cancel an in-flight deploy; queue instead.
concurrency:
  group: ship-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ship:
    name: Ship ${{ inputs.app || 'web' }}
    runs-on: ubuntu-latest

    permissions:
      # tools/ship.ts performs `git add -u && git commit && git push`
      # after the build, so the workflow token needs write access.
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so git operations in ship.ts have the necessary context.
          fetch-depth: 0
          # Prefer a dedicated PAT (SHIP_GIT_TOKEN) if provided; otherwise fall
          # back to the built-in workflow token.  `github.token` is the
          # standard expression for the workflow token on both GitHub Actions
          # and Forgejo Actions (Forgejo also exposes it as GITHUB_TOKEN for
          # compatibility, but the expression form is more portable).
          token: ${{ secrets.SHIP_GIT_TOKEN || github.token }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          # Keep in sync with the `packageManager` field in package.json.
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          # Configures .npmrc so that NODE_AUTH_TOKEN authenticates against
          # https://npm.pkg.github.com for @narduk-enterprises/* packages.
          registry-url: 'https://npm.pkg.github.com'

      - name: Install Doppler CLI
        run: |
          curl -Ls --tlsv1.2 --proto "=https" --retry 3 \
            https://cli.doppler.com/install.sh | sudo sh

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Configure git identity
        run: |
          # Identity used for the auto-commit ship.ts makes after the build.
          # Update these values if a different bot identity is preferred.
          git config user.email "ship-bot@myboat.app"
          git config user.name "Ship Bot [Forgejo]"

      - name: Ship
        # `pnpm run ship` expands to `pnpm exec tsx tools/ship.ts`.
        # preship hook: check-setup · pnpm install · audit · drift check ·
        #               sync-health · quality check.
        # ship.ts: KV repair → build → git commit/push → D1 migrate → deploy.
        run: pnpm run ship ${{ inputs.app || 'web' }}
        env:
          # Doppler CLI uses this token to fetch prd secrets at runtime.
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          # Also needed here: preship re-runs `pnpm install --frozen-lockfile`
          # and quality checks that reference @narduk-enterprises/* types.
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
